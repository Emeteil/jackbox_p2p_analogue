<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PartyBox Player</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body class="player-body">
    <div id="player-sidebar" class="sidebar">
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <div class="sidebar-content" id="sidebar-content">
        </div>
    </div>
    <button id="sidebar-toggle" class="sidebar-toggle-btn" onclick="toggleSidebar()" style="display:none;">
        <span>☰</span>
    </button>
    <div id="player-container">
    </div>
    <div id="status-overlay" class="overlay flex-center">
        <div class="status-box glass-panel">
            <div class="spinner"></div>
            <h2>Connecting...</h2>
        </div>
    </div>
    <script src="lib/utils.js"></script>
    <script src="lib/connection_manager.js"></script>
    <script src="lib/localization.js"></script>
    <script src="lib/player_engine.js"></script>
    <script>
        const appEngine = new PlayerEngine();
        function toggleSidebar() {
            const sidebar = document.getElementById('player-sidebar');
            sidebar.classList.toggle('open');
        }
        document.addEventListener('DOMContentLoaded', () => {
            appEngine.connect();
            const checkVIP = setInterval(() => {
                if (appEngine.me) {
                    document.getElementById('sidebar-toggle').style.display = 'flex';
                    clearInterval(checkVIP);
                }
            }, 500);
        });
    </script>
</body>

</html>
