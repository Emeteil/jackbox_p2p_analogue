<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>КВИПЛЭШ — SHITBOX Party</title>
    <meta name="description" content="Квиплэш — игра в остроумие для компании друзей">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
</head>

<body>
    <div id="lobby-ui" class="lobby-overlay" style="background: linear-gradient(135deg, #1a0a2e, #2d1b4e);">
        <div class="lobby-content glass-panel" style="border-color: rgba(124, 58, 237, 0.3);">
            <h1 class="lobby-title"
                style="background: linear-gradient(135deg, #fbbf24, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 3rem;">
                КВИПЛЭШ</h1>
            <div class="qr-container">
                <canvas id="qr-code"></canvas>
            </div>
            <div class="join-info">
                <p>Подключайтесь с телефона:</p>
                <div class="url-badge" id="join-url">Загрузка...</div>
            </div>
            <div class="players-section">
                <h3>ИГРОКИ (<span id="player-count">0</span>)</h3>
                <div id="players-list" class="players-grid"></div>
            </div>
            <button id="host-start-indicator" class="primary-btn" disabled
                style="background: linear-gradient(135deg, #7c3aed, #ec4899);">Ожидаем игроков...</button>
        </div>
    </div>
    <div id="game-container"></div>
    <script src="../../lib/utils.js"></script>
    <script src="../../lib/connection_manager.js"></script>
    <script src="../../lib/localization.js"></script>
    <script src="../../lib/host_engine.js"></script>
    <script src="narrator.js"></script>
    <script src="sound.js"></script>
    <script src="host.js"></script>
    <script>
        const engine = new HostEngine('quiplash', 3);
        document.addEventListener('DOMContentLoaded', async () => {
            await engine.initLobby('qr-code', 'join-url', 'players-list', 'host-start-indicator');
            if (typeof window.bindGameToEngine === 'function') {
                window.bindGameToEngine(engine);
            }
        });
    </script>
</body>

</html>
