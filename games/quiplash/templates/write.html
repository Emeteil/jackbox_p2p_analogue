<div class="ql-player-write">
    <div class="ql-prompt-card">{{prompt}}</div>
    <div class="ql-write-area">
        <input type="text" id="ql-answer-input" class="ql-input" maxlength="80" placeholder="Ваш ответ..."
            autocomplete="off">
        <div class="ql-char-count"><span id="ql-char-current">0</span>/80</div>
        <button id="ql-submit-btn" class="ql-submit-btn">ОТПРАВИТЬ</button>
    </div>
    <div id="ql-prompt-counter" class="ql-prompt-counter">Вопрос {{current}} из {{total}}</div>
</div>
