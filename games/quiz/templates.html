<template id="tpl-waiting">
    <div class="quiz-player-ui">
        <div class="quiz-player-status">Waiting for next question...</div>
    </div>
</template>
<template id="tpl-answers">
    <div class="quiz-player-ui">
        <div class="quiz-player-status" id="player-question"></div>
        <button class="quiz-btn" data-answer="0" id="btn-0"></button>
        <button class="quiz-btn" data-answer="1" id="btn-1"></button>
        <button class="quiz-btn" data-answer="2" id="btn-2"></button>
        <button class="quiz-btn" data-answer="3" id="btn-3"></button>
    </div>
</template>
<template id="tpl-result">
    <div class="quiz-player-ui" style="background-color: var(--result-bg, transparent);">
        <div class="quiz-player-status" id="result-text" style="font-size: 3rem; font-weight: bold;"></div>
        <div style="font-size: 1.5rem; text-align: center; margin-top: 1rem;" id="score-text"></div>
    </div>
</template>
